    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --transition: all 0.3s ease;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 150px 0 100px;
            background: var(--dark);
            color: var(--pure);
            min-height: 100vh;
        }

        .hero-content {
            flex: 1;
            padding: 0 50px;
        }

        .hero-image {
            flex: 1;
            text-align: center;
        }

        .hero-image img {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
        }

        .hero-text h1 {
            font-size: 40px;
            margin: 10px 0;
        }

        .hero-text p {
            color: #aaa;
            line-height: 1.6;
        }
    </style>
</head>
